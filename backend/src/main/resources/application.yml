server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: gemma4
          temperature: 0.7
    mcp:
      server:
        enabled: true
        name: chatbot-mcp-server
        version: 1.0.0

chat:
  system-prompt: "You are a helpful assistant."
  history:
    max-messages: 20
