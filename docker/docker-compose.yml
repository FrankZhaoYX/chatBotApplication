version: '3.9'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - bff

  bff:
    build:
      context: ../bff
      dockerfile: ../docker/bff.Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      BACKEND_URL: http://backend:8080
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
